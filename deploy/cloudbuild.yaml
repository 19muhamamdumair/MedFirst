# Cloud Build configuration for MedFirstAi
# Automated CI/CD pipeline for Google Cloud Run deployment
# 
# Usage:
#   gcloud builds submit --config=deploy/cloudbuild.yaml \
#     --substitutions=_GOOGLE_API_KEY="your-api-key"

steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medfirstai-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medfirstai-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'
    id: 'build-backend'

  # Step 2: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medfirstai-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/medfirstai-frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend/'
    id: 'build-frontend'

  # Step 3: Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medfirstai-backend:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Step 4: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medfirstai-frontend:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Step 5: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medfirstai-backend'
      - '--image=gcr.io/$PROJECT_ID/medfirstai-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--timeout=300'
      - '--max-instances=2'
      - '--session-affinity'
      - '--set-env-vars=GOOGLE_API_KEY=${_GOOGLE_API_KEY}'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Step 6: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medfirstai-frontend'
      - '--image=gcr.io/$PROJECT_ID/medfirstai-frontend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--max-instances=2'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']

# Substitution variables (can be overridden)
substitutions:
  _REGION: us-central1
  _GOOGLE_API_KEY: ''

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/medfirstai-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/medfirstai-backend:latest'
  - 'gcr.io/$PROJECT_ID/medfirstai-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/medfirstai-frontend:latest'

# Build timeout (20 minutes)
timeout: '1200s'
